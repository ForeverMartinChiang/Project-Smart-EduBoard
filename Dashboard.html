<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEduBoard - Intelligent Worksatation</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind Config to match original style exactly -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blue: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
                    }
                }
            }
            safelist: [
                'bg-indigo-50', 'bg-orange-50', 'bg-green-50', 'bg-pink-50', 'bg-blue-50', 'bg-gray-50'
            ]
        }
    </script>
    
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        body { background-color: #F9FAFB; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Main Application Script -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import * as LucideIcons from 'https://esm.sh/lucide-react@0.292.0';

        // Destructure icons
        const {
            Search, Bell, Grid, List, MoreHorizontal, Clock, Star, Trash2, FolderOpen, Plus, ChevronDown, 
            LayoutTemplate, Users, FileText, Settings, LogOut, MonitorPlay, ChevronLeft, Menu, Download, 
            Video, Lightbulb, Timer, Network, BarChart2, Filter, MessageSquare, Share2, MousePointer2, 
            LayoutGrid, StickyNote, Type, Minus, MessageCircle, Frame, Table, BrainCircuit, ChevronsRight, 
            Undo2, Redo2, Map, PenTool, Minimize, Maximize, HelpCircle, ChevronUp, Play, Scan,
            // AI Panel Icon Added
            X, Split, PlayCircle, UploadCloud, Image, File, Disc, Globe, 
            ListChecks, GitBranch, Rocket, Puzzle, Target, FileSearch, GraduationCap, Hand, Megaphone, Layers, BookOpen
        } = LucideIcons;

        // ==========================================
        // 1. SHARED & DASHBOARD COMPONENTS
        // ==========================================

        const SidebarItem = ({ icon: Icon, label, active, onClick, count }) => (
            <div onClick={onClick} className={`flex items-center justify-between px-4 py-2.5 mx-2 rounded-lg cursor-pointer transition-colors text-sm font-medium ${active ? 'bg-blue-50 text-blue-600' : 'text-gray-600 hover:bg-gray-100'}`}>
                <div className="flex items-center gap-3">
                    <Icon size={18} />
                    <span>{label}</span>
                </div>
                {count && <span className="text-xs text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded-full">{count}</span>}
            </div>
        );

        const FileCard = ({ title, date, owner, isNew, color, onClick }) => (
            <div onClick={onClick} className="group relative bg-white border border-gray-200 rounded-xl hover:shadow-lg transition-all duration-200 cursor-pointer overflow-hidden flex flex-col h-[220px]">
                <div className={`h-[140px] w-full ${color || 'bg-gray-50'} relative p-4 flex items-center justify-center overflow-hidden`}>
                {isNew ? (
                    <div className="flex flex-col items-center justify-center text-blue-600 gap-2">
                        <div className="bg-blue-100 p-3 rounded-full"><Plus size={24} /></div>
                        <span className="text-sm font-medium">New Canvas</span>
                    </div>
                ) : (
                    <div className="w-full h-full bg-white shadow-sm rounded border border-gray-100 opacity-60 transform scale-90 group-hover:scale-95 transition-transform relative">
                        <div className="h-2 w-1/3 bg-gray-200 rounded mt-4 ml-4"></div>
                        <div className="h-2 w-1/2 bg-gray-200 rounded mt-2 ml-4"></div>
                        <div className="h-2 w-1/4 bg-gray-200 rounded mt-2 ml-4"></div>
                        <div className="absolute bottom-3 right-3 opacity-50">
                            <div className="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center"><LayoutGrid size={14} className="text-blue-300" /></div>
                        </div>
                    </div>
                )}
                {!isNew && (
                    <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button className="p-1.5 bg-white rounded-md shadow-sm border border-gray-200 hover:bg-gray-50 text-gray-500"><Star size={14} /></button>
                    </div>
                )}
                </div>
                <div className="flex-1 p-3 flex flex-col justify-between bg-white relative z-10">
                    <div>
                        <h3 className={`font-medium text-sm truncate ${isNew ? 'text-blue-600 text-center mt-2' : 'text-gray-800'}`}>{title}</h3>
                        {!isNew && <p className="text-xs text-gray-400 mt-1 flex items-center gap-1"><Clock size={10} /> {date}</p>}
                    </div>
                    {!isNew && (
                        <div className="flex items-center justify-between mt-2 pt-2 border-t border-gray-50">
                            <div className="flex items-center gap-1.5">
                                <div className="w-5 h-5 rounded-full bg-purple-100 text-purple-600 text-[10px] flex items-center justify-center font-bold">{owner?.[0] || 'M'}</div>
                                <span className="text-[10px] text-gray-500">{owner || 'Me'}</span>
                            </div>
                            <button className="text-gray-400 hover:text-gray-600"><MoreHorizontal size={16} /></button>
                        </div>
                    )}
                </div>
            </div>
        );

        const Dashboard = ({ onOpenFile }) => {
            const [activeTab, setActiveTab] = useState('recent');
            const [viewMode, setViewMode] = useState('grid');
            const mockFiles = [
                { id: 1, title: 'Example：Marking Assignments Workflow', date: 'Just now，click to enter', owner: 'Mr.Lee', color: 'bg-indigo-50' },
                { id: 2, title: 'Fintech Research Papers Collected', date: '2h ago', owner: 'Haoh', color: 'bg-orange-50' },
                { id: 3, title: 'Decision Tree Builtup', date: 'yesterday', owner: 'Daniel', color: 'bg-green-50' },
                { id: 4, title: 'Business Project A', date: 'three days ago', owner: 'Echo', color: 'bg-pink-50' },
                { id: 5, title: 'Special Effects Project', date: 'a week ago', owner: 'Cathy', color: 'bg-blue-50' },
                { id: 6, title: '', date: '2026/2/10', owner: 'Me', color: 'bg-gray-50' },
            ];

            return (
                <div className="flex h-screen w-full bg-[#F9FAFB] font-sans text-gray-800">
                    <div className="w-64 bg-white border-r border-gray-200 flex flex-col flex-shrink-0">
                        <div className="h-16 flex items-center px-5 gap-3 border-b border-gray-100">
                            <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-sm flex-shrink-0">
                                <span className="text-white font-bold text-sm tracking-tighter">SE</span>
                            </div>
                            <span className="font-bold text-gray-800 text-base tracking-tight">SmartEduBoard思迈</span>
                        </div>
                        <div className="p-4">
                            <button onClick={() => onOpenFile({ title: 'Untitled Canvas', isNew: true })} className="w-full bg-blue-600 hover:bg-blue-700 text-white flex items-center justify-center gap-2 py-2.5 rounded-lg shadow-sm transition-all font-medium text-sm">
                                <Plus size={18} /> New Canvas
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto py-2 space-y-1">
                            <SidebarItem icon={Clock} label="Recently open" active={activeTab === 'recent'} onClick={() => setActiveTab('recent')} />
                            <SidebarItem icon={FolderOpen} label="My files" active={activeTab === 'myfiles'} onClick={() => setActiveTab('myfiles')} count={12} />
                            <SidebarItem icon={Star} label="Starred files" active={activeTab === 'starred'} onClick={() => setActiveTab('starred')} />
                            <div className="pt-4 pb-2 px-6 text-xs font-semibold text-gray-400 uppercase tracking-wider">Team Space</div>
                            <SidebarItem icon={Users} label="Rainbow Team" active={activeTab === 'team1'} onClick={() => setActiveTab('team1')} />
                        </div>
                        <div className="p-4 border-t border-gray-100 space-y-1">
                            <SidebarItem icon={Trash2} label="Trash bin" />
                            <SidebarItem icon={Settings} label="Settings" />
                        </div>
                    </div>
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <div className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 flex-shrink-0 z-10">
                            <div className="flex-1 max-w-xl">
                                <div className="relative group">
                                    <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-blue-500 transition-colors" size={18} />
                                    <input type="text" placeholder="Search canvas, documents or folders..." className="w-full bg-gray-50 border border-gray-200 text-sm rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all" />
                                </div>
                            </div>
                            <div className="flex items-center gap-4 ml-4">
                                <div className="flex items-center gap-2 cursor-pointer hover:bg-gray-50 p-1 rounded-lg pr-2 transition-colors">
                                    <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-semibold text-xs border-2 border-white shadow-sm">M</div>
                                    <div className="hidden md:block text-left">
                                        <div className="text-sm font-medium text-gray-700 leading-none">Martin</div>
                                        <div className="text-[10px] text-gray-500 mt-0.5">Student·Premium</div>
                                    </div>
                                    <ChevronDown size={14} className="text-gray-400" />
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8">
                            <div className="max-w-7xl mx-auto">
                                <div className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl p-6 mb-8 text-white shadow-md flex items-center justify-between relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-xl font-bold mb-2">Welcome back, Martin! 👋</h2>
                                        <p className="text-blue-100 text-sm max-w-lg">The SmartEduBoard has been updated to V2.0, enabling free exploration of the AI Agent Centre for efficient learning and collaboration.</p>
                                    </div>
                                    <MonitorPlay className="absolute -right-6 -bottom-6 text-white opacity-10 w-48 h-48" />
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                    <FileCard isNew title="New Canvas" onClick={() => onOpenFile({ title: 'Untitled Canvas', isNew: true })} />
                                    {mockFiles.map(file => (
                                        <FileCard key={file.id} {...file} onClick={() => onOpenFile(file)} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 2. EDITOR COMPONENTS & AI Panel
        // ==========================================

        const IconButton = ({ icon: Icon, active, className = "", onClick }) => (
            <button onClick={onClick} className={`p-2 rounded hover:bg-gray-100 text-gray-600 ${active ? 'bg-blue-50 text-blue-600' : ''} ${className}`}>
                <Icon size={20} strokeWidth={1.5} />
            </button>
        );

        const ToolItem = ({ icon: Icon, active, color, onClick }) => (
            <div onClick={onClick} className={`w-10 h-10 flex items-center justify-center rounded hover:bg-gray-100 cursor-pointer my-1 transition-colors ${active ? 'bg-blue-50' : ''}`}>
                <Icon size={20} strokeWidth={1.5} className={color || "text-gray-700"} />
            </div>
        );

        const WorkflowCard = ({ title, number, content, headerColor = "bg-blue-100", children, className, style }) => (
            <div className={`absolute bg-white rounded-lg shadow-md border border-gray-200 flex flex-col ${className}`} style={style}>
                <div className={`h-10 ${headerColor} rounded-t-lg flex items-center px-3 justify-between border-b border-gray-100`}>
                    <div className="flex items-center gap-2">
                        {number && <span className="bg-blue-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">{number}</span>}
                        <span className="font-semibold text-gray-700 text-sm">{title}</span>
                    </div>
                    <div className="flex gap-2">
                        <Settings size={14} className="text-gray-500" />
                        <div className="bg-blue-600 rounded-full p-1 cursor-pointer hover:bg-blue-700"><Play size={10} className="text-white fill-white" /></div>
                    </div>
                </div>
                <div className="p-4 text-xs text-gray-600 leading-relaxed overflow-hidden">{content}{children}</div>
            </div>
        );

        const DocCard = ({ title, children, className, style }) => (
            <div className={`absolute bg-white rounded-sm shadow-lg border border-gray-200 p-6 flex flex-col ${className}`} style={{ ...style, width: '220px', minHeight: '300px' }}>
                <div className="mb-4 border-b pb-2"><h3 className="font-bold text-gray-800 text-xs">{title}</h3></div>
                <div className="text-[10px] text-gray-500 space-y-2">{children}</div>
            </div>
        );

        const StickyNoteElement = ({ text, color = "bg-yellow-100", className, style, author }) => (
            <div className={`absolute ${color} shadow-md p-3 rounded-sm transform rotate-1 ${className}`} style={{ ...style, maxWidth: '140px', fontSize: '10px' }}>
                <p className="text-gray-800 font-medium leading-tight">{text}</p>
                {author && <div className="mt-2 flex items-center gap-1"><div className="w-4 h-4 rounded-full bg-gray-300"></div><span className="text-[8px] text-gray-500">{author}</span></div>}
            </div>
        );

        const SpeechBubble = ({ text, style, tailPosition = "bottom" }) => (
            <div className="absolute bg-white border border-gray-200 shadow-sm rounded-2xl px-3 py-2 text-[10px] text-gray-600 z-20 max-w-[150px]" style={style}>
                {text}
                <div className={`absolute w-3 h-3 bg-white border-r border-b border-gray-200 transform rotate-45 ${tailPosition === 'bottom' ? '-bottom-1.5 left-1/2 -translate-x-1/2' : '-left-1.5 top-1/2 -translate-y-1/2'}`}></div>
            </div>
        );

        // ==========================================
        // AI AGENT PANEL COMPONENT
        // ==========================================
        const AIAgentPanel = ({ isOpen, onClose }) => {
            // Data mappings for English content & icons matching the screenshots
            const basicItems = [
                { icon: PlayCircle, label: 'Start Node', color: 'text-blue-500', bg: 'bg-blue-50' },
                { icon: Split, label: 'Condition', color: 'text-purple-500', bg: 'bg-purple-50' },
                { icon: Type, label: 'Text Block', color: 'text-indigo-500', bg: 'bg-indigo-50' },
                { icon: UploadCloud, label: 'File Block', color: 'text-orange-500', bg: 'bg-orange-50' },
                { icon: Image, label: 'Image', color: 'text-gray-400', bg: 'bg-gray-100' },
                { icon: File, label: 'File', color: 'text-gray-400', bg: 'bg-gray-100' },
                { icon: Video, label: 'Video', color: 'text-gray-400', bg: 'bg-gray-100' },
                { icon: Disc, label: 'Audio', color: 'text-gray-400', bg: 'bg-gray-100' },
                { icon: Globe, label: 'Webpage', color: 'text-gray-400', bg: 'bg-gray-100' },
            ];

            const platformItems = [
                { icon: BrainCircuit, label: 'Custom Agent', color: 'text-purple-500', bg: 'bg-purple-50' },
                { icon: Lightbulb, label: 'Prompt Opt', color: 'text-blue-400', bg: 'bg-blue-50' },
                { icon: ListChecks, label: 'Task Planner', color: 'text-orange-500', bg: 'bg-orange-50' },
                { icon: Network, label: 'Mindmap', color: 'text-blue-600', bg: 'bg-blue-50' },
                { icon: MonitorPlay, label: 'PPT Gen', color: 'text-red-400', bg: 'bg-red-50' },
                { icon: GitBranch, label: 'Flowchart', color: 'text-fuchsia-500', bg: 'bg-fuchsia-50' },
                { icon: FileText, label: 'Meeting Note', color: 'text-blue-500', bg: 'bg-blue-50' },
                { icon: Rocket, label: 'Speed Read', color: 'text-indigo-500', bg: 'bg-indigo-50' },
                { icon: Puzzle, label: '4P Marketing', color: 'text-orange-600', bg: 'bg-orange-50' },
                { icon: HelpCircle, label: '5Why Analysis', color: 'text-yellow-500', bg: 'bg-yellow-50' },
                { icon: Target, label: 'SMART Rule', color: 'text-teal-500', bg: 'bg-teal-50' },
                { icon: FileSearch, label: 'Resume Opt', color: 'text-blue-500', bg: 'bg-blue-50' },
                { icon: GraduationCap, label: 'Lesson Plan', color: 'text-purple-600', bg: 'bg-purple-50' },
                { icon: Hand, label: 'Class Interact', color: 'text-orange-400', bg: 'bg-orange-50' },
                { icon: Megaphone, label: 'Knowledge Exp', color: 'text-green-500', bg: 'bg-green-50' },
                { icon: Layers, label: 'Teaching Mat', color: 'text-indigo-400', bg: 'bg-indigo-50' },
            ];

            const renderGrid = (items) => (
                <div className="grid grid-cols-4 gap-y-5 gap-x-2 mt-4">
                    {items.map((item, idx) => (
                        <div key={idx} className="flex flex-col items-center gap-1.5 cursor-pointer group">
                            <div className={`w-[52px] h-[52px] rounded-2xl ${item.bg} flex items-center justify-center group-hover:shadow-md transition-all duration-200 transform group-hover:-translate-y-0.5 border border-white group-hover:border-gray-100`}>
                                <item.icon size={24} strokeWidth={1.5} className={item.color} />
                            </div>
                            <span className="text-[10px] text-gray-600 text-center leading-tight px-1 group-hover:text-blue-600 font-medium">{item.label}</span>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className={`absolute top-0 left-0 h-full w-[360px] bg-white shadow-[15px_0_30px_rgba(0,0,0,0.08)] border-r border-gray-100 z-30 transition-transform duration-300 ease-in-out transform flex flex-col ${isOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                    
                    {/* Panel Header */}
                    <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 shrink-0 bg-white">
                        <h2 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                            Agent Center <span className="bg-purple-100 text-purple-600 text-[10px] px-2 py-0.5 rounded-full font-bold">Beta</span>
                        </h2>
                        <button onClick={onClose} className="text-gray-400 hover:text-gray-700 p-1.5 rounded-md hover:bg-gray-100 transition-colors"><X size={18}/></button>
                    </div>

                    {/* Scrollable Content */}
                    <div className="flex-1 overflow-y-auto px-6 py-5 space-y-8 pb-10">

                        {/* Top Info Banner & Demo Button */}
                        <div className="space-y-4">
                            <div className="flex items-center justify-between text-xs bg-pink-50/50 border border-pink-100/50 px-4 py-2.5 rounded-xl text-gray-700">
                                <div className="flex items-center gap-2">
                                    <div className="w-5 h-5 rounded-full bg-gradient-to-r from-blue-400 to-purple-500 flex items-center justify-center text-white shadow-sm"><BrainCircuit size={12}/></div>
                                    <span className="font-medium">Remaining: 100 times</span>
                                    <HelpCircle size={12} className="text-gray-400 cursor-help"/>
                                </div>
                                <a href="#" className="font-bold text-pink-600 hover:underline flex items-center">Upgrade <ChevronUp size={12} className="ml-0.5"/></a>
                            </div>

                            <button className="w-full bg-gradient-to-r from-indigo-500 to-blue-500 hover:from-indigo-600 hover:to-blue-600 text-white font-bold py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02]">
                                Try Demo, Examples <MousePointer2 size={16} className="ml-1 opacity-80" />
                            </button>
                        </div>

                        {/* Search Bar */}
                        <div className="flex gap-2">
                            <div className="relative flex-1">
                                <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" size={16} />
                                <input type="text" placeholder="Search agents..." className="w-full bg-gray-50 border border-gray-200 rounded-xl pl-9 pr-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition-colors" />
                            </div>
                            <div className="border border-gray-200 rounded-xl px-3 flex items-center justify-between bg-white cursor-pointer min-w-[90px] text-sm text-gray-600 hover:bg-gray-50 transition-colors">
                                All <ChevronDown size={14} className="text-gray-400"/>
                            </div>
                        </div>

                        {/* Recently Used Section */}
                        <div>
                            <h3 className="text-xs font-bold text-gray-500 mb-4">Recently Used / Installed</h3>
                            <div className="flex gap-3">
                                <div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center shadow-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><FileSearch size={22}/></div>
                                <div className="w-12 h-12 rounded-2xl bg-purple-50 text-purple-500 flex items-center justify-center shadow-sm border border-purple-100 cursor-pointer hover:bg-purple-100 transition-colors"><BrainCircuit size={22}/></div>
                                <div className="w-12 h-12 rounded-2xl bg-teal-50 text-teal-500 flex items-center justify-center shadow-sm border border-teal-100 cursor-pointer hover:bg-teal-100 transition-colors"><BookOpen size={22}/></div>
                                <div className="w-12 h-12 rounded-2xl bg-blue-50 text-blue-400 flex items-center justify-center shadow-sm border border-blue-100 cursor-pointer hover:bg-blue-100 transition-colors"><Lightbulb size={22}/></div>
                            </div>
                        </div>

                        {/* Basic Orchestration Section */}
                        <div className="border-t border-gray-100 pt-6">
                            <div className="flex justify-between items-center cursor-pointer group">
                                <h3 className="text-base font-bold text-gray-800">Basic Orchestration</h3>
                                <ChevronDown size={18} className="text-gray-800" />
                            </div>
                            {renderGrid(basicItems)}
                        </div>

                        {/* Platform Selected Agents Section */}
                        <div className="border-t border-gray-100 pt-6">
                            <div className="flex justify-between items-center cursor-pointer group">
                                <h3 className="text-base font-bold text-gray-800">Platform Selected</h3>
                                <ChevronDown size={18} className="text-gray-800" />
                            </div>
                            {renderGrid(platformItems)}
                        </div>
                    </div>
                    
                    {/* Panel Footer */}
                    <div className="p-4 border-t border-gray-100 flex items-center justify-between text-sm text-gray-600 bg-gray-50/50 shrink-0">
                        <div className="flex items-center gap-2 cursor-pointer hover:text-blue-600 font-medium">
                            <LayoutGrid size={16} className="text-purple-500"/> App Center
                        </div>
                        <div className="flex items-center gap-1 cursor-pointer hover:text-blue-600 text-gray-400 text-xs">
                            <Lightbulb size={14}/> Create yours →
                        </div>
                    </div>
                </div>
            )
        };

        // --- CONTENT 1: Marking Assignments Workflow  ---
        const WorkflowContent = () => (
            <>
                <svg className="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
                    <path d="M 450 600 C 500 600, 500 450, 620 380" fill="none" stroke="#D8B4FE" strokeWidth="2" markerEnd="url(#arrowhead)" />
                    <path d="M 850 350 C 900 350, 900 350, 950 350" fill="none" stroke="#94A3B8" strokeWidth="1.5" markerEnd="url(#arrowhead-gray)" />
                    <path d="M 750 500 C 750 600, 750 600, 750 680" fill="none" stroke="#D8B4FE" strokeWidth="2" markerEnd="url(#arrowhead)" />
                    <path d="M 450 750 C 500 750, 550 780, 620 720" fill="none" stroke="#D8B4FE" strokeWidth="2" markerEnd="url(#arrowhead)" />
                    <path d="M 850 720 C 900 720, 920 720, 950 720" fill="none" stroke="#D8B4FE" strokeWidth="2" markerEnd="url(#arrowhead)" />
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#D8B4FE" /></marker>
                        <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94A3B8" /></marker>
                    </defs>
                </svg>

                <div className="absolute top-20 left-80 w-[300px] bg-white p-2 shadow-sm border border-gray-200 rounded">
                    <h3 className="text-gray-500 mb-2 text-sm font-medium">作业评判参考</h3>
                    <div className="border border-blue-100 bg-blue-50/30 rounded p-1">
                        <div className="grid grid-cols-4 gap-1 text-[8px] text-gray-500 text-center">
                            <div className="col-span-1 bg-blue-100 p-1">评分标准</div>
                            <div className="col-span-1 bg-blue-100 p-1">优秀</div>
                            <div className="col-span-1 bg-blue-100 p-1">良好</div>
                            <div className="col-span-1 bg-blue-100 p-1">一般</div>
                            {[1,2,3,4].map(i => (<React.Fragment key={i}><div className="border-b border-blue-200 p-1">内容</div><div className="border-b border-blue-200 p-1">-</div><div className="border-b border-blue-200 p-1">-</div><div className="border-b border-blue-200 p-1">-</div></React.Fragment>))}
                        </div>
                    </div>
                </div>
                <SpeechBubble text="可以根据具体文案类型灵活调整评分重点，例如应用文注重格式，议论文注重逻辑展开" style={{ top: '-5px', left: '420px', width: '180px' }} />
                <div className="absolute top-80 left-100 bg-green-200 rounded-full w-20 h-20 flex items-center justify-center text-center text-[10px] shadow-sm z-10" style={{ top: '120px', left: '260px' }}>Martin<br/>is<br/>ready</div>

                <div className="absolute top-[350px] left-[280px] w-[200px] h-[400px] bg-white border border-gray-200 shadow-md p-3 rounded-md">
                     <h3 className="text-gray-600 mb-3 text-sm font-medium">作业区</h3>
                     <div className="space-y-2">
                        <div className="flex gap-2"><div className="w-6 h-6 bg-blue-100 text-blue-500 text-[10px] flex items-center justify-center rounded">项目</div><div className="flex-1 h-6 bg-gray-50 border border-dashed border-gray-300 rounded"></div></div>
                         <div className="flex gap-2"><div className="w-6 h-6 bg-blue-100 text-blue-500 text-[10px] flex items-center justify-center rounded">学生<br/>作业</div><div className="flex flex-col gap-2"><div className="w-24 h-16 bg-gray-200 rounded overflow-hidden relative"><div className="absolute inset-0 flex items-center justify-center text-[8px] text-gray-400">Image 1</div></div><div className="w-24 h-16 bg-gray-200 rounded overflow-hidden relative"><div className="absolute inset-0 flex items-center justify-center text-[8px] text-gray-400">Image 2</div></div></div></div>
                     </div>
                     <StickyNoteElement text="如果学生作业较多，也可以批量上传后台批量处理" author="Martin" color="bg-yellow-100" style={{ bottom: '40px', right: '-40px' }} />
                     <SpeechBubble text="这里可以链接云端文件夹" style={{ top: '-10px', right: '-60px' }} tailPosition="left" />
                </div>

                <WorkflowCard title="作业点评" number="1" headerColor="bg-blue-50" className="w-[280px] h-[320px]" style={{ top: '250px', left: '600px', zIndex: 10 }} content={
                        <div className="space-y-2"><p>你是一位资深高中英语教师，请根据图片中的作文题目和两位学生的作文内容，自动识别并完成以下任务：</p><ol className="list-decimal pl-4 space-y-1 text-gray-500"><li>按照中国高中英语作文评分标准分别给出每位学生的分项得分和总分；</li><li>给出清晰点评，指出优点与不足；</li><li>用鼓励性语言给出的一句评语；</li></ol><p className="mt-2 text-gray-400 italic">请从图片中提取题目和学生作业内容后再进行...</p></div>
                    } />
                 <div className="absolute bg-[#C8F08F] shadow-md p-3 rounded-sm transform -rotate-2 z-20 text-center flex flex-col items-center justify-center" style={{ top: '150px', left: '620px', width: '160px', height: '90px' }}><p className="text-gray-800 font-bold text-xs leading-tight">老师可修改<br/>系统提示词，<br/>自定义打分风<br/>格或输出格式</p><span className="text-[8px] mt-1 text-gray-600">Martin 提交者</span></div>

                </div>

                        <div className="space-y-2"><p>请根据以下信息，生成一份英语作文的进阶训练建议，面向高中生。输出格式如下：</p><p>【学生姓名】：（请提取或填写）</p><p>【作文类型】：（如应用文/说明文/议论文）</p><p>【训练方向】：<br/><span className="text-gray-400">列出2个建议重点练习的方向，综合语法点或表达技巧。</span></p></div>
                    } />

                <div className="absolute" style={{ top: '650px', left: '950px' }}>
                     <h3 className="text-gray-500 mb-2 ml-2 text-sm">学生写作提升指南</h3>
                    <DocCard title="学生写作提升指南"><p><strong>学生1：</strong></p><p>【评分结果】：21分（良好）</p><p>【问题简述】：语法准确性较好，但词汇多样性略显不足。</p><br/><p><strong>学生2：</strong></p><p>【评分结果】：18分（一般）</p><p>【训练方向】：1. 强化单词掌握... 2. 学习标准段落结构...</p></DocCard>
                     <SpeechBubble text="可以根据原始作文薄弱项生成专属训练建议" style={{ top: '-30px', left: '120px', width: '180px' }} />
                </div>
            </>
        );

        const DraftContent = () => (
            <>
                {/* Placeholder Area */}
                <div className="absolute top-[100px] left-[400px] w-[250px] h-[150px] border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center text-gray-400">
                    <LayoutGrid size={24} className="mb-2 opacity-50"/>
                    <span className="text-xs">Drag components here</span>
                </div>
            </>
        );


        // ==========================================
        // 3. EDITOR WRAPPER
        // ==========================================
        const Editor = ({ onBack, fileName }) => {
            const [zoom, setZoom] = useState(0.9);
            
            // Core Status：Control AI Panel Acts
            const [isAIPanelOpen, setIsAIPanelOpen] = useState(false);

            const handleZoomIn = () => setZoom(prev => Math.min(prev + 0.1, 2.0));
            const handleZoomOut = () => setZoom(prev => Math.max(prev - 0.1, 0.2));
            const resetZoom = () => setZoom(0.9);

            const isWorkflow = fileName === 'Marking Assignments Workflow';

            return (
                <div className="flex flex-col h-screen w-full bg-[#F4F4F4] overflow-hidden font-sans text-slate-800 relative">

                <div className="h-14 bg-white border-b border-gray-200 flex items-center justify-between px-4 z-50 shrink-0">
                    <div className="flex items-center gap-4">
                    <div onClick={onBack} className="p-1 hover:bg-gray-100 rounded cursor-pointer transition-colors" title="Back to Dashboard">
                        <ChevronLeft size={20} className="text-gray-600" />
                    </div>
                    <div className="flex items-center gap-2">
                        <h1 className="font-bold text-gray-800 text-sm md:text-base">{fileName || 'Untitled Canvas'}</h1>
                        <Star size={16} className="text-blue-500 fill-blue-500" />
                        <span className="bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded border border-gray-200">Free tier</span>
                    </div>
                    </div>
                    <div className="flex items-center gap-2">
                        <div className="hidden md:flex bg-gray-100 rounded-lg p-1 gap-1 mr-4">
                            <IconButton icon={Video} />
                            <IconButton icon={Timer} />
                            <IconButton icon={BarChart2} />
                        </div>
                        <div className="flex items-center gap-3">
                            <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md text-sm font-medium flex items-center gap-2 transition-colors"><Share2 size={16} /> Share</button>
                        </div>
                    </div>
                </div>

                <div className="flex flex-1 relative overflow-hidden">
                    {/*  Leftside Toolbar */}
                    <div className="w-14 bg-white border-r border-gray-200 flex flex-col items-center py-4 gap-1 z-40 shadow-[2px_0_5px_rgba(0,0,0,0.02)]">
                        <div className="bg-blue-50 p-1.5 rounded-md mb-2 cursor-pointer"><MousePointer2 size={20} className="text-blue-600 fill-blue-600" /></div>
                        
                        <ToolItem icon={LayoutGrid} />
                        <ToolItem icon={StickyNote} />
                        <ToolItem icon={Type} />
                        <ToolItem icon={Network} />
                        
                        {/* Trigger 1：Leftside AI Icon */}
                        <ToolItem 
                            icon={BrainCircuit} 
                            color={isAIPanelOpen ? "text-purple-600" : "text-purple-400 hover:text-purple-600"} 
                            active={isAIPanelOpen}
                            onClick={() => setIsAIPanelOpen(!isAIPanelOpen)} 
                        />
                        
                        <div className="mt-auto flex flex-col gap-2 mb-4"><ToolItem icon={Undo2} /><ToolItem icon={Redo2} /></div>
                    </div>

                    {/* New Added AI Panel Compoments 
                        Same Layer as Canvas, slip from leftside
                    */}
                    <AIAgentPanel isOpen={isAIPanelOpen} onClose={() => setIsAIPanelOpen(false)} />

                    {/* Canvas Area */}
                    <div className="flex-1 relative bg-[#F4F4F4] overflow-auto cursor-grab active:cursor-grabbing p-10">
                        <div className="relative w-[1400px] h-[1000px] mx-auto origin-top-left transition-transform duration-100 ease-linear"
                             style={{ transform: `scale(${zoom})` }}>
                             {isWorkflow ? <WorkflowContent /> : <DraftContent />}
                        </div>
                    </div>
                </div>
                
                {/*  Bottom AI Icon  */}
                <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex items-center gap-3 z-50">
                    
                    {/* 🌟 Trigger 2：Bottom AI Icon 🌟 */}
                    <div className="bg-white rounded-lg shadow-lg border border-gray-200 p-1 flex items-center">
                        <button 
                            onClick={() => setIsAIPanelOpen(!isAIPanelOpen)} 
                            className={`w-10 h-10 flex items-center justify-center rounded transition-colors ${isAIPanelOpen ? 'bg-purple-100 text-purple-700' : 'hover:bg-gray-100 text-purple-600'}`}
                        >
                            <BrainCircuit size={24} />
                            <span className="text-[10px] absolute bottom-1 font-bold">AI</span>
                        </button>
                    </div>

                    <div className="bg-white rounded-lg shadow-lg border border-gray-200 p-1 flex items-center gap-1 px-2 h-12">
                        <button className="p-2 hover:bg-gray-100 rounded text-gray-600"><Map size={18} /></button>
                        <div className="h-6 w-px bg-gray-200 mx-1"></div>
                        <button onClick={handleZoomOut} className="p-2 hover:bg-gray-100 rounded text-gray-600 active:bg-gray-200 transition-colors"><Minus size={16} /></button>
                        <span className="text-sm font-medium text-gray-700 w-12 text-center select-none">{Math.round(zoom * 100)}%</span>
                        <button onClick={handleZoomIn} className="p-2 hover:bg-gray-100 rounded text-gray-600 active:bg-gray-200 transition-colors"><Plus size={16} /></button>
                        <div className="h-6 w-px bg-gray-200 mx-1"></div>
                        <button onClick={resetZoom} className="p-2 hover:bg-gray-100 rounded text-gray-600" title="Reset"><Maximize size={16} /></button>
                        <button className="p-2 hover:bg-gray-100 rounded text-gray-600 bg-gray-800 text-white rounded-full w-8 h-8 flex items-center justify-center"><HelpCircle size={16} /></button>
                    </div>
                </div>
                </div>
            );
        };

        function App() {
            const [currentView, setCurrentView] = useState('dashboard');
            const [currentFile, setCurrentFile] = useState(null);

            return (
                <React.Fragment>
                {currentView === 'dashboard' ? (
                    <Dashboard onOpenFile={(f) => { setCurrentFile(f); setCurrentView('editor'); }} />
                ) : (
                    <Editor onBack={() => { setCurrentView('dashboard'); setCurrentFile(null); }} fileName={currentFile?.title} />
                )}
                </React.Fragment>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
